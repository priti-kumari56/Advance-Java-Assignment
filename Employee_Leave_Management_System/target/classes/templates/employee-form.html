<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Add / Update Employee</h3>

        <form th:action="@{/employees/save}" 
              th:object="${employee}" 
              method="post">

            <input type="hidden" th:field="*{employeeId}"/>

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control"
                       th:field="*{name}" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control"
                       th:field="*{email}" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control"
                       th:field="*{department}" required/>
            </div>

            <div class="mb-3">
                <label class="form-label">Joining Date</label>
                <input type="date" class="form-control"
                       th:field="*{joiningDate}" required/>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success">Save</button>
                <a th:href="@{/employees}" class="btn btn-secondary">Back</a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
