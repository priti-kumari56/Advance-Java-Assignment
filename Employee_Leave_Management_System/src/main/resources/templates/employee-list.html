<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Employee List</h2>

    <div class="text-end mb-3">
        <a th:href="@{/employees/new}" class="btn btn-primary">Add Employee</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Joining Date</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.employeeId}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
            <td th:text="${emp.department}"></td>
            <td th:text="${emp.joiningDate}"></td>
            <td>
                <a th:href="@{/employees/edit/{id}(id=${emp.employeeId})}"
                   class="btn btn-warning btn-sm">Edit</a>

                <a th:href="@{/employees/delete/{id}(id=${emp.employeeId})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
